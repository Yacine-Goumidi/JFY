<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pour Toi ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 380px;
            position: relative;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .buttons button {
            margin: 5px;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #ff6b81;
            color: white;
            font-weight: 500;
            transition: all 0.2s;
        }

        .buttons button:hover {
            transform: scale(1.1);
            background: #ff4d6d;
        }

        .message {
            margin-top: 20px;
            font-size: 16px;
            min-height: 70px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .heart {
            position: absolute;
            color: red;
            animation: float 5s linear infinite;
            font-size: 20px;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-600px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pour toi 💌</h1>
    <div class="subtitle">Peu importe la distance, je suis toujours là ❤️</div>

    <!-- Remplace par votre vraie photo -->
    <img src="https://via.placeholder.com/350x200" alt="Nous deux">

    <div class="buttons">
        <button onclick="showMessage('happy')">😊 Heureuse</button>
        <button onclick="showMessage('sad')">😢 Triste</button>
        <button onclick="showMessage('miss')">💔 Tu me manques</button>
        <button onclick="showMessage('stress')">😣 Stressée</button>
        <button onclick="showMessage('love')">❤️ Amour</button>
        <button onclick="showMessage('tired')">😴 Fatiguée</button>
        <button onclick="showMessage('angry')">😡 Énervée</button>
        <button onclick="showMessage('proud')">🎉 Fière</button>
    </div>

    <div id="message" class="message"></div>
</div>

<script>
    const messages = {
        happy: [
            "Ton sourire illumine même mes journées les plus sombres ❤️",
            "Si tu es heureuse, alors moi aussi je le suis 💕"
        ],
        sad: [
            "Même loin, je suis là pour te serrer fort 💕",
            "Tes larmes comptent pour moi… je suis avec toi ❤️"
        ],
        miss: [
            "Chaque seconde loin de toi me rapproche du moment où je te reverrai ❤️",
            "Tu me manques plus que tout… mais ça vaut le coup pour nous 💔"
        ],
        stress: [
            "Respire doucement… tu es plus forte que tu ne le penses 💫",
            "Je crois en toi, toujours ❤️"
        ],
        love: [
            "Je t'aime plus que les mots ne pourront jamais le dire ❤️",
            "Si je pouvais, je serais déjà à côté de toi 💕"
        ],
        tired: [
            "Repose-toi mon cœur… tu mérites tout le calme du monde 😴",
            "Même fatiguée, tu restes la plus incroyable ❤️"
        ],
        angry: [
            "Même quand tu es énervée, je t'aime autant ❤️",
            "Prends ton temps… je suis là quand tu veux 💕"
        ],
        proud: [
            "Je suis tellement fier de toi ❤️",
            "Tu es incroyable, n'oublie jamais ça 🎉"
        ]
    };

    function showMessage(emotion) {
        const messageDiv = document.getElementById('message');
        const random = messages[emotion][Math.floor(Math.random() * messages[emotion].length)];

        messageDiv.classList.remove('show');

        setTimeout(() => {
            messageDiv.textContent = random;
            messageDiv.classList.add('show');
            createHearts();
        }, 200);
    }

    function createHearts() {
        for (let i = 0; i < 5; i++) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + '%';
            heart.innerHTML = '❤️';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    }
</script>

</body>
</html>
